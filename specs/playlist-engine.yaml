openapi: 3.1.0

info:
  title: Playlist Engine API
  description: |
    Served by the Go microservice. Accepts normalised weather conditions, maps them
    to mood/audio parameters, calls the Spotify API to search tracks and create (or
    replace) a playlist, and returns the Spotify embed URL.

    All outbound Spotify calls originate from this service — this is the primary
    CVE surface for the Go Chainguard image under test.

    Authentication: Spotify credentials are injected via environment variables
    (SPOTIFY_CLIENT_ID, SPOTIFY_CLIENT_SECRET, SPOTIFY_REFRESH_TOKEN).
    The service handles token refresh internally; callers do not supply tokens.

    Correlation: X-Correlation-Id is generated by the upstream .NET service and
    passed here. This service echoes it on all responses. X-Experiment-Id references
    a manifest in specs/experiments/ and is also echoed through.
  version: 0.2.0

servers:
  - url: http://localhost:5100
    description: Local dev (direct)
  - url: http://playlist-engine
    description: Aspire service-discovery name

tags:
  - name: playlist
    description: Weather-to-Spotify playlist operations
  - name: ops
    description: Operational endpoints

paths:

  /playlist/generate:
    post:
      operationId: generatePlaylist
      tags: [playlist]
      summary: Map weather conditions to a new Spotify playlist
      description: |
        1. Maps the incoming WeatherCondition to mood/audio parameters (PlaylistRecipe).
        2. Calls Spotify search API to find matching tracks.
        3. Creates a new Spotify playlist with those tracks (always new — no caching).
        4. Returns the playlist ID, embed URL, and the recipe used.
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/ExperimentIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePlaylistRequest'
            example:
              weather:
                condition: rain
                temp_celsius: 11.4
                feels_like_celsius: 9.1
                humidity: 83
                wind_speed_mps: 5.2
                description: light rain
                time_of_day: afternoon
              location_label: London
              experiment_id: EXP-001
      responses:
        '200':
          description: Playlist created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
            X-Experiment-Id:
              $ref: '#/components/headers/ExperimentId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/SpotifyUnauthorized'
        '429':
          $ref: '#/components/responses/SpotifyRateLimited'
        '502':
          $ref: '#/components/responses/SpotifyError'

  /recipe:
    post:
      operationId: getRecipe
      tags: [playlist]
      summary: Derive playlist recipe from weather without calling Spotify
      description: |
        Returns the mood/audio mapping for a given WeatherCondition without making
        any Spotify calls. Exercises the Go compute path and glibc only — no openssl.
        Use as a k6 stress-test target to isolate Go image CVE surface from
        Spotify API latency and rate limits.
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/ExperimentIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeatherCondition'
      responses:
        '200':
          description: Derived recipe
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
            X-Experiment-Id:
              $ref: '#/components/headers/ExperimentId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistRecipe'
        '400':
          $ref: '#/components/responses/BadRequest'

  /health:
    get:
      operationId: healthCheck
      tags: [ops]
      summary: Liveness and Spotify token probe
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:

  parameters:
    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      required: false
      description: |
        Correlation ID originated by the upstream .NET service. Echoed on all responses.
        If absent (e.g. direct calls during testing), this service echoes whatever is
        present or omits the header.
      schema:
        type: string
        format: uuid
    ExperimentIdHeader:
      name: X-Experiment-Id
      in: header
      required: false
      description: |
        References an experiment manifest in specs/experiments/. Echoed on all responses.
      schema:
        type: string
        example: EXP-001

  headers:
    CorrelationId:
      description: Echoed from the X-Correlation-Id request header.
      schema:
        type: string
        format: uuid
    ExperimentId:
      description: Echoed from the X-Experiment-Id request header, if present.
      schema:
        type: string

  schemas:

    WeatherCondition:
      type: object
      required:
        - condition
        - temp_celsius
        - feels_like_celsius
        - humidity
        - wind_speed_mps
        - description
        - time_of_day
      properties:
        condition:
          type: string
          enum: [clear, clouds, rain, drizzle, thunderstorm, snow, mist, fog, haze]
        temp_celsius:
          type: number
          format: double
        feels_like_celsius:
          type: number
          format: double
        humidity:
          type: integer
          minimum: 0
          maximum: 100
        wind_speed_mps:
          type: number
          format: double
        description:
          type: string
          example: light rain
        time_of_day:
          type: string
          enum: [morning, afternoon, evening, night]

    GeneratePlaylistRequest:
      type: object
      required: [weather]
      properties:
        weather:
          $ref: '#/components/schemas/WeatherCondition'
        location_label:
          type: string
          description: Used to name the Spotify playlist
          example: London
        experiment_id:
          type: string
          description: |
            References a manifest in specs/experiments/. Echoed in the response body
            and X-Experiment-Id header.
          example: EXP-001

    PlaylistRecipe:
      type: object
      required:
        - mood
        - genres
        - tempo_range
        - energy_level
        - valence
        - track_count
      properties:
        mood:
          type: string
          enum: [happy, melancholic, energetic, calm, dramatic, cozy, upbeat, dark]
        genres:
          type: array
          items:
            type: string
          minItems: 1
          example: [indie pop, acoustic]
        tempo_range:
          type: object
          required: [min_bpm, max_bpm]
          properties:
            min_bpm:
              type: integer
              minimum: 40
            max_bpm:
              type: integer
              maximum: 220
        energy_level:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
        valence:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
        track_count:
          type: integer
          minimum: 5
          maximum: 30

    PlaylistResult:
      type: object
      required:
        - playlist_id
        - spotify_embed_url
        - playlist_name
        - recipe
        - tracks_added
        - created_at
      properties:
        playlist_id:
          type: string
          description: Spotify playlist ID
          example: 37i9dQZF1DXcBWIGoYBM5M
        spotify_embed_url:
          type: string
          format: uri
          example: https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M
        playlist_name:
          type: string
          example: Rainy Tuesday in London
        recipe:
          $ref: '#/components/schemas/PlaylistRecipe'
        experiment_id:
          type: string
          description: Echoed from the request, if supplied.
          example: EXP-001
        tracks_added:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        spotify_token:
          type: string
          enum: [ok, expired, missing]

    ProblemDetails:
      description: RFC 9457 problem details
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
        correlation_id:
          type: string
          format: uuid
          description: Echoed from X-Correlation-Id for log correlation on errors.
        experiment_id:
          type: string
          description: Echoed from X-Experiment-Id, if present.

  responses:
    BadRequest:
      description: Invalid or missing fields in request body
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    SpotifyUnauthorized:
      description: Spotify token is missing or could not be refreshed
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    SpotifyRateLimited:
      description: Spotify API rate limit exceeded
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
        X-Experiment-Id:
          $ref: '#/components/headers/ExperimentId'
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    SpotifyError:
      description: Spotify API returned an unexpected error
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
        X-Experiment-Id:
          $ref: '#/components/headers/ExperimentId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
